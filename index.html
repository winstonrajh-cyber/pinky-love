<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Pinky 💞</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family: Arial, sans-serif;
  text-align:center;
  cursor:pointer;
}

h1{
  position:absolute;
  width:100%;
  top:30px;
  font-size:30px;
  color:#ff4da6;
  animation: glow 2s infinite alternate;
}

p{
  position:absolute;
  width:100%;
  top:160px;
  font-size:18px;
  color:white;
}

@keyframes glow{
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 25px hotpink; }
}

canvas{
  position:absolute;
}
</style>
</head>

<body>

<h1>
Sorry My Pinky 💞 <br>
I never feel to say “I love you” <br>
to anyone without your permission… <br>
You are my only world 💖
</h1>

<p>
Click anywhere to feel my love 💗
</p>

<canvas id="heart"></canvas>

<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
var canvas = document.getElementById("heart");
var ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function heart(t){
  return {
    x: 16*Math.pow(Math.sin(t),3),
    y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  }
}

let particles = [];

for(let i=0;i<2000;i++){
  let t = Math.random()*Math.PI*2;
  let pos = heart(t);
  particles.push({
    x: canvas.width/2 + pos.x*15,
    y: canvas.height/2 + pos.y*15,
    size: Math.random()*2+1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  particles.forEach(p=>{
    ctx.fillStyle="pink";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();

document.body.addEventListener("click", function() {
    document.getElementById("bgMusic").play();
});
</script>

</body>
</html>
