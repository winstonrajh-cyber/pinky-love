<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>For My Pinky 💙</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
text-align:center;
color:white;
}

/* background heart */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* gift */

#gift{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
cursor:pointer;
}

/* text */

#text{
position:absolute;
top:70%;
width:100%;
font-size:26px;
color:#4da6ff;
}

/* photo */

#photo{
display:none;
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:320px;
border-radius:20px;
box-shadow:0 0 25px #4da6ff;
opacity:0;
transition:1.5s;
}

</style>

</head>

<body>

<canvas id="heart"></canvas>

<div id="gift">🎁</div>

<div id="text"></div>

<img id="photo" src="photo2.jpg">

<audio id="song" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

/* canvas setup */

var canvas=document.getElementById("heart");
var ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

/* heart math */

function heart(t){
return{
x:16*Math.pow(Math.sin(t),3),
y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
}
}

/* particles */

let particles=[];

for(let i=0;i<1500;i++){

let t=Math.random()*Math.PI*2;
let pos=heart(t);

particles.push({
x:canvas.width/2+pos.x*15,
y:canvas.height/2+pos.y*15,
size:Math.random()*2
});

}

/* animation */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.fillStyle="#4da6ff";
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

/* elements */

var gift=document.getElementById("gift");
var text=document.getElementById("text");
var photo=document.getElementById("photo");
var song=document.getElementById("song");

/* click event */

gift.onclick=function(){

song.play();

gift.style.display="none";

typeText("I think I am very rugged... but you changed me.",0);

}

/* typing */

function typeText(message,index){

if(index<message.length){

text.innerHTML+=message.charAt(index);

setTimeout(function(){
typeText(message,index+1);
},70);

}
else{

photo.style.display="block";

setTimeout(function(){
photo.style.opacity="1";
},100);

}

}

</script>

</body>
</html>
