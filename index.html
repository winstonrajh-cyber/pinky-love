<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>For My Pinky 💙</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
text-align:center;
color:white;
}

/* gift box */

#gift{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
cursor:pointer;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translate(-50%,-50%) translateY(0)}
50%{transform:translate(-50%,-50%) translateY(-15px)}
100%{transform:translate(-50%,-50%) translateY(0)}
}

/* typing text */

#text{
position:absolute;
top:70%;
width:100%;
font-size:26px;
color:#4da6ff;
padding:20px;
}

/* photo */

#photo{
display:none;
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:320px;
border-radius:20px;
box-shadow:0 0 30px #4da6ff;
opacity:0;
transition:2s;
}

/* proposal popup */

#proposal{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:20px;
box-shadow:0 0 30px #4da6ff;
}

button{
padding:12px 30px;
font-size:20px;
background:#4da6ff;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="gift">🎁</div>

<div id="text"></div>

<img id="photo" src="photo2.jpg">

<div id="proposal">

<h2>Will you stay with me forever Pinky? 💙</h2>

<button onclick="yesAnswer()">YES 💙</button>

</div>

<audio id="song" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

window.onload = function(){

var gift=document.getElementById("gift");
var text=document.getElementById("text");
var photo=document.getElementById("photo");
var song=document.getElementById("song");

/* gift click */

gift.addEventListener("click", function(){

gift.style.display="none";

typeText("I think I am very rugged... but you changed me.",0);

});

/* typing effect */

function typeText(message,index){

if(index<message.length){

text.innerHTML += message.charAt(index);

setTimeout(function(){
typeText(message,index+1);
},70);

}
else{

setTimeout(showPhoto,2000);

}

}

/* photo reveal */

function showPhoto(){

song.play();

photo.style.display="block";

setTimeout(function(){
photo.style.opacity=1;
},200);

text.innerHTML="";

typeSecond("You changed me. This is the truth. You have all rights. Sorry Pinky sometimes I play with you 🤗💞 Other than you nothing is important.",0);

}

/* second typing */

function typeSecond(message,index){

if(index<message.length){

text.innerHTML += message.charAt(index);

setTimeout(function(){
typeSecond(message,index+1);
},70);

}
else{

setTimeout(function(){
document.getElementById("proposal").style.display="block";
},2000);

}

}

window.yesAnswer=function(){

document.getElementById("proposal").style.display="none";

text.innerHTML="Thank you for changing my life Pinky 💙";

}

}

</script>

</body>
</html>
